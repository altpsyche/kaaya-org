backend:
  name: github
  repo: altpsyche/kaaya-org
  branch: main
  base_url: https://api.netlify.com
  site_id: 8e46abbd-8b87-4ce9-9e16-8f064fb6f561

media_folder: "public/uploads"
public_folder: "/uploads"

collections:
  - name: "blog"
    label: "Blog"
    folder: "src/content/blog"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Publish Date", name: "pubDate", widget: "datetime" }
      - { label: "Description", name: "description", widget: "text" }
      - { label: "Hero Image", name: "heroImage", widget: "image", required: false }
      - { label: "Author", name: "author", widget: "string", required: false }
      - { label: "Read Time", name: "readTime", widget: "string", required: false, hint: "e.g. '5 min read'" }
      - label: "Categories"
        name: "categories"
        widget: "select"
        multiple: true
        required: false
        options:
          - "Plug N Play"
          - "Eco School"
          - "Farm To Fork"
          - "Kaaya Living"
          - "Eco System"
          - "Events"
          - "Fellowships"
          - "Educational Tours"
          - "Neighbourhoods"
          - "Workshops"
          - "Volunteering/Internship"
          - "Nature Camps"
          - "Maker's Space"
          - "Nature's Cafe"
          - "Making of Kaaya"
          - "Residency"
          - "Job/Volunteering"
          - "Experiences"
          - "Upcoming Events"
          - "Community Action"
          - "Sustainable Living"
          - "Community Updates"
          - "Program/Events"
          - "Reflections"
      - { label: "Body", name: "body", widget: "markdown" }

  - name: "pages"
    label: "Page Settings"
    files:
      - name: "home"
        label: "Home"
        file: "src/content/pages/home.yaml"
        fields:
          - { label: "Hero Image", name: "heroImage", widget: "image", required: false }
          - { label: "Hero Heading", name: "heroHeading", widget: "string", required: false }
          - { label: "Hero Subheading", name: "heroSubheading", widget: "string", required: false }
      - name: "place"
        label: "Place"
        file: "src/content/pages/place.yaml"
        fields:
          - { label: "Hero Image", name: "heroImage", widget: "image", required: false }
          - { label: "Hero Heading", name: "heroHeading", widget: "string", required: false }
          - { label: "Hero Subheading", name: "heroSubheading", widget: "string", required: false }
      - name: "learn"
        label: "Learn"
        file: "src/content/pages/learn.yaml"
        fields:
          - { label: "Hero Image", name: "heroImage", widget: "image", required: false }
          - { label: "Hero Heading", name: "heroHeading", widget: "string", required: false }
          - { label: "Hero Subheading", name: "heroSubheading", widget: "string", required: false }
      - name: "incubate"
        label: "Incubate"
        file: "src/content/pages/incubate.yaml"
        fields:
          - { label: "Hero Image", name: "heroImage", widget: "image", required: false }
          - { label: "Hero Heading", name: "heroHeading", widget: "string", required: false }
          - { label: "Hero Subheading", name: "heroSubheading", widget: "string", required: false }
      - name: "exchange"
        label: "Exchange"
        file: "src/content/pages/exchange.yaml"
        fields:
          - { label: "Hero Image", name: "heroImage", widget: "image", required: false }
          - { label: "Hero Heading", name: "heroHeading", widget: "string", required: false }
          - { label: "Hero Subheading", name: "heroSubheading", widget: "string", required: false }
      - name: "visit"
        label: "Visit"
        file: "src/content/pages/visit.yaml"
        fields:
          - { label: "Hero Image", name: "heroImage", widget: "image", required: false }
          - { label: "Hero Heading", name: "heroHeading", widget: "string", required: false }
          - { label: "Hero Subheading", name: "heroSubheading", widget: "string", required: false }
