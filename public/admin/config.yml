backend:
  name: github
  repo: altpsyche/kaaya-org
  branch: main
  base_url: https://api.netlify.com

media_folder: "src/assets/uploads"
public_folder: "/assets/uploads"

collections:
  - name: "blog"
    label: "Blog"
    folder: "src/content/blog"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Publish Date", name: "pubDate", widget: "datetime" }
      - { label: "Description", name: "description", widget: "text" }
      - { label: "Hero Image", name: "heroImage", widget: "image", required: false }
      - { label: "Author", name: "author", widget: "string", required: false }
      - { label: "Read Time", name: "readTime", widget: "string", required: false, hint: "e.g. '5 min read'" }
      - label: "Categories"
        name: "categories"
        widget: "select"
        multiple: true
        required: false
        options:
          - "Plug N Play"
          - "Eco School"
          - "Farm To Fork"
          - "Kaaya Living"
          - "Eco System"
          - "Events"
          - "Fellowships"
          - "Educational Tours"
          - "Neighbourhoods"
          - "Workshops"
          - "Volunteering/Internship"
          - "Nature Camps"
          - "Maker's Space"
          - "Nature's Cafe"
          - "Making of Kaaya"
          - "Residency"
          - "Job/Volunteering"
          - "Experiences"
          - "Upcoming Events"
          - "Community Action"
          - "Sustainable Living"
          - "Community Updates"
          - "Program/Events"
          - "Reflections"
      - { label: "Body", name: "body", widget: "markdown" }
